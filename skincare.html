<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F3EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Glow — Skincare Routine</title>
<style>
  :root{
    --bg:#F6F3EF; --card:#FFFFFF; --ink:#2E2A26; --muted:#928A82; --faint:#B9B0A8;
    --line:#EEE8E1;
    --am:#E39B58; --am-ink:#9A5C1E; --am-tint:#FBF1E6;
    --pm:#7A82BC; --pm-ink:#4A4F86; --pm-tint:#EDEEF8;
    --active:#B368A6; --active-ink:#82397A; --active-tint:#F7EBF5;
    --accent:#6C9A81; --accent-ink:#3F6C55; --accent-tint:#E9F2EC;
    --danger:#C0603F;
    --radius:20px; --radius-sm:14px;
    --shadow:0 6px 22px rgba(60,45,30,0.07);
    --shadow-sm:0 2px 8px rgba(60,45,30,0.05);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.45;
    padding:0 16px calc(48px + env(safe-area-inset-bottom));
    max-width:520px; margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{margin:0; font-weight:700;}
  .appbar{
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:calc(14px + env(safe-area-inset-top)) 0 10px;
    position:sticky; top:0; background:linear-gradient(var(--bg) 78%, rgba(246,243,239,0));
    z-index:20;
  }
  .appbar .logo{font-size:20px; font-weight:800; letter-spacing:.3px;}
  .appbar .logo span{color:var(--accent-ink);}
  .card{
    background:var(--card); border-radius:var(--radius); padding:18px;
    box-shadow:var(--shadow); margin-bottom:16px;
  }
  .muted{color:var(--muted);}
  .tiny{font-size:12.5px;}

  /* ---- Today hero ---- */
  .today .datenav{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .today .datenav button{
    width:40px; height:40px; border-radius:50%; border:none; background:var(--bg);
    color:var(--ink); font-size:20px; cursor:pointer; flex:none;
  }
  .today .datenav button:active{background:var(--line);}
  .today .dateblock{text-align:center;}
  .today .weekday{font-size:22px; font-weight:800;}
  .today .fulldate{font-size:13px; color:var(--muted); margin-top:1px;}
  .todaypill{
    display:inline-block; margin-top:6px; font-size:12px; font-weight:700;
    padding:3px 12px; border-radius:999px; background:var(--accent-tint); color:var(--accent-ink);
  }
  .tonight{
    margin-top:14px; padding:14px 16px; border-radius:var(--radius-sm);
    background:var(--pm-tint); display:flex; align-items:center; gap:12px;
  }
  .tonight.rest{background:#F1EEEA;}
  .tonight.active-set{background:var(--active-tint);}
  .tonight .ic{font-size:22px; flex:none;}
  .tonight .lbl{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted);}
  .tonight .val{font-size:16px; font-weight:700; line-height:1.25;}
  .tonight.active-set .val{color:var(--active-ink);}

  .progress{display:flex; gap:10px; margin-top:14px;}
  .progress .p{
    flex:1; border-radius:var(--radius-sm); padding:11px 12px; text-align:center;
    background:var(--bg); border:1.5px solid transparent; transition:.25s;
  }
  .progress .p .k{font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted);}
  .progress .p .v{font-size:14px; font-weight:700; margin-top:2px;}
  .progress .p.am.done{background:var(--am-tint); border-color:var(--am); color:var(--am-ink);}
  .progress .p.pm.done{background:var(--pm-tint); border-color:var(--pm); color:var(--pm-ink);}
  .progress .p.done .v::before{content:"✓ ";}

  /* ---- Guide card ---- */
  .guide{display:flex; gap:13px; align-items:flex-start; border-left:4px solid var(--accent);}
  .guide .gic{font-size:22px; flex:none; margin-top:1px;}
  .guide .gt{font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--accent-ink); margin-bottom:3px;}
  .guide .gb{font-size:14px; line-height:1.5;}
  .guide .gb b{color:var(--ink);}
  .guide.warn{border-left-color:var(--am);} .guide.warn .gt{color:var(--am-ink);}

  /* ---- Mode toggle ---- */
  .modetoggle{display:flex; background:var(--bg); border-radius:999px; padding:4px; margin-top:14px;}
  .modetoggle button{
    flex:1; border:none; background:transparent; padding:9px 0; border-radius:999px;
    font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; transition:.2s;
  }
  .modetoggle button.sel{background:var(--am); color:#fff; box-shadow:var(--shadow-sm);}
  .modehint{font-size:12.5px; color:var(--muted); margin-top:8px; text-align:center;}

  /* ---- Section headers ---- */
  .sec-h{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .sec-h .dot{width:12px; height:12px; border-radius:50%; flex:none;}
  .sec-h.am .dot{background:var(--am);} .sec-h.pm .dot{background:var(--pm);}
  .sec-h h2{font-size:18px;}
  .sec-h .count{margin-left:auto; font-size:12.5px; font-weight:700; color:var(--muted);}
  .card.am{border-top:4px solid var(--am);}
  .card.pm{border-top:4px solid var(--pm);}

  /* ---- Steps ---- */
  .steps{margin-top:8px;}
  .step{
    display:flex; align-items:flex-start; gap:13px; padding:12px 8px; border-radius:var(--radius-sm);
    cursor:pointer; transition:background .2s; position:relative;
  }
  .step + .step{border-top:1px solid var(--line);}
  .step .box{
    width:26px; height:26px; border-radius:9px; border:2px solid var(--faint);
    flex:none; margin-top:1px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:15px; transition:.22s cubic-bezier(.2,.8,.3,1.4);
  }
  .step .box::after{content:"✓"; transform:scale(0); transition:.22s cubic-bezier(.2,.8,.3,1.4);}
  .step.checked .box{transform:scale(1);}
  .step.checked .box::after{transform:scale(1);}
  .step .body{flex:1; min-width:0;}
  .step .name{font-size:15.5px; font-weight:600; transition:.2s;}
  .step.checked .name{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--faint);}
  .step .tag{
    display:inline-block; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;
    padding:2px 8px; border-radius:999px; margin-top:5px; background:var(--bg); color:var(--muted);
  }
  .k-cleanse .tag{background:#EFEAE4; color:#8a7d6d;}
  .k-soothe .tag{background:var(--accent-tint); color:var(--accent-ink);}
  .k-essence .tag{background:#EDEEF8; color:#5d6497;}
  .k-moisturise .tag{background:#E9F2EC; color:var(--accent-ink);}
  .k-sunscreen .tag{background:var(--am-tint); color:var(--am-ink);}
  .k-ampoule .tag{background:#F1EAF3; color:#7a5a86;}
  .k-active .tag{background:var(--active-tint); color:var(--active-ink);}

  .step.checked.on-am .box{background:var(--am); border-color:var(--am);}
  .step.checked.on-pm .box{background:var(--pm); border-color:var(--pm);}
  .step.checked.on-active .box{background:var(--active); border-color:var(--active);}

  .step.essential .name::after{content:" ★"; color:var(--am); font-size:13px;}
  details.note{margin-top:7px;}
  details.note summary{
    font-size:12.5px; font-weight:700; color:var(--accent-ink); cursor:pointer; list-style:none;
    display:inline-flex; align-items:center; gap:5px; user-select:none;
  }
  details.note summary::-webkit-details-marker{display:none;}
  details.note summary::before{content:"ⓘ"; font-size:13px;}
  details.note[open] summary::before{content:"×";}
  .note .nbody{margin-top:8px; font-size:13.5px; line-height:1.5;}
  .note .nrow{margin-bottom:8px;}
  .note .nrow:last-child{margin-bottom:0;}
  .note .nrow b{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:1px;}

  .actives-wrap{margin-top:14px; padding-top:12px; border-top:2px dashed var(--line);}
  .actives-wrap .ah{display:flex; align-items:center; gap:8px;}
  .actives-wrap .ah .dot{width:12px;height:12px;border-radius:50%;background:var(--active);}
  .actives-wrap .ah h3{font-size:15px;}
  .actives-wrap .sub{font-size:12px; color:var(--muted); margin:3px 0 4px;}
  .step.active-step .name{font-weight:700;}
  .badge-tonight{
    display:inline-block; font-size:10px; font-weight:800; letter-spacing:.4px; text-transform:uppercase;
    background:var(--active); color:#fff; padding:2px 8px; border-radius:999px; margin-left:6px; vertical-align:middle;
  }
  .locked-note{font-size:12.5px; color:var(--muted); background:var(--bg); padding:12px 14px; border-radius:var(--radius-sm); margin-top:10px;}

  /* ---- Avatar ---- */
  .avatar{width:38px; height:38px; border-radius:12px; flex:none; display:flex; align-items:center; justify-content:center; font-size:20px; overflow:hidden; background:var(--bg); line-height:1;}
  .avatar img{width:100%; height:100%; object-fit:cover; display:block;}
  .k-cleanse .avatar{background:#EFEAE4;}
  .k-soothe .avatar{background:var(--accent-tint);}
  .k-essence .avatar{background:#EDEEF8;}
  .k-moisturise .avatar{background:#E9F2EC;}
  .k-sunscreen .avatar{background:var(--am-tint);}
  .k-ampoule .avatar{background:#F1EAF3;}
  .k-active .avatar{background:var(--active-tint);}

  /* ---- SPF reapply ---- */
  .spf{margin-top:14px; padding:14px; border-radius:var(--radius-sm); background:var(--am-tint); transition:.25s;}
  .spf .st{display:flex; align-items:center; gap:7px; font-weight:800; color:var(--am-ink); font-size:14px;}
  .spf .ss{font-size:12.5px; color:var(--am-ink); opacity:.85; margin:5px 0 10px; line-height:1.45;}
  .spf .times{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .spf .times span{background:#fff; color:var(--am-ink); font-size:12px; font-weight:700; padding:4px 9px; border-radius:999px;}
  .spf button{width:100%; padding:11px; border:none; border-radius:11px; background:var(--am); color:#fff; font-weight:700; font-size:14px; cursor:pointer;}
  .spf.due{background:#F7E0CE;}

  /* ---- Month calendar ---- */
  .cal .caltop{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .cal .caltop button{width:38px; height:38px; border-radius:50%; border:none; background:var(--bg); font-size:18px; cursor:pointer; color:var(--ink);}
  .cal .caltop button:active{background:var(--line);}
  .cal .caltop .mt{font-weight:800; font-size:16px;}
  .cal .wk{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:6px;}
  .cal .wk div{text-align:center; font-size:11px; font-weight:700; color:var(--faint);}
  .cal .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .cal .cell{aspect-ratio:1/1; border-radius:11px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:var(--bg); cursor:pointer;}
  .cal .cell.blank{background:transparent; cursor:default;}
  .cal .cell .cn{font-size:13px; font-weight:600;}
  .cal .cell.today{outline:2px solid var(--accent); outline-offset:-2px;}
  .cal .cell.sel{background:var(--accent);}
  .cal .cell.sel .cn{color:#fff;}
  .cal .cd{display:flex; gap:3px; height:6px;}
  .cal .cd i{width:6px; height:6px; border-radius:50%; background:transparent;}
  .cal .cd i.am{background:var(--am);} .cal .cd i.pm{background:var(--pm);}
  .cal .cell.sel .cd i.am{background:#fff;} .cal .cell.sel .cd i.pm{background:#CFE6D8;}
  .cal .callegend{display:flex; gap:16px; margin-top:12px; font-size:12px; color:var(--muted); justify-content:center;}
  .cal .callegend span{display:inline-flex; align-items:center; gap:6px;}
  .cal .callegend i{width:10px; height:10px; border-radius:50%; display:inline-block;}
  .cal .callegend i.am{background:var(--am);} .cal .callegend i.pm{background:var(--pm);}

  /* ---- Day note ---- */
  .daynote label{font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:8px;}
  .daynote textarea{
    width:100%; border:1.5px solid var(--line); border-radius:var(--radius-sm); background:var(--bg);
    padding:12px; font-family:inherit; font-size:14.5px; color:var(--ink); resize:vertical; min-height:52px; line-height:1.4;
  }
  .daynote textarea:focus{outline:none; border-color:var(--accent); background:#fff;}

  /* ---- Week ---- */
  .weekgrid{display:flex; justify-content:space-between; gap:6px; margin-top:12px;}
  .weekgrid .d{flex:1; text-align:center;}
  .weekgrid .dl{font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px;}
  .weekgrid .dn{font-size:12px; color:var(--faint); margin-bottom:7px;}
  .weekgrid .d.today .dn{color:var(--ink); font-weight:800;}
  .weekgrid .d.today .dl{color:var(--accent-ink);}
  .dots{display:flex; flex-direction:column; gap:5px; align-items:center;}
  .dots i{width:15px; height:15px; border-radius:5px; background:var(--line); display:block;}
  .dots i.am{background:var(--am);} .dots i.pm{background:var(--pm);}
  .streak{display:flex; align-items:center; gap:12px; margin-top:16px; padding:14px; border-radius:var(--radius-sm); background:var(--accent-tint);}
  .streak .num{font-size:30px; font-weight:800; color:var(--accent-ink); line-height:1;}
  .streak .txt{font-size:13.5px; color:var(--accent-ink);} .streak .txt b{display:block; font-size:15px;}
  .weeklegend{display:flex; gap:16px; margin-top:14px; font-size:12px; color:var(--muted);}
  .weeklegend span{display:inline-flex; align-items:center; gap:6px;}
  .weeklegend i{width:12px; height:12px; border-radius:4px; display:inline-block;}
  .weeklegend i.am{background:var(--am);} .weeklegend i.pm{background:var(--pm);}

  /* ---- Settings ---- */
  details.settings > summary{
    list-style:none; cursor:pointer; font-size:18px; font-weight:700;
    display:flex; align-items:center; gap:10px;
  }
  details.settings > summary::-webkit-details-marker{display:none;}
  details.settings > summary::after{content:"⌄"; margin-left:auto; font-size:22px; color:var(--muted); transition:.2s;}
  details.settings[open] > summary::after{transform:rotate(180deg);}
  .set-block{margin-top:18px;}
  .set-block > h3{font-size:14px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:10px;}
  .seg{display:flex; background:var(--bg); border-radius:12px; padding:4px; gap:4px;}
  .seg button{flex:1; border:none; background:transparent; padding:10px; border-radius:9px; font-weight:700; font-size:14px; color:var(--muted); cursor:pointer;}
  .seg button.sel{background:var(--accent); color:#fff;}
  .unlock label{display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--line); cursor:pointer;}
  .unlock label:last-child{border-bottom:none;}
  .unlock input{width:22px; height:22px; accent-color:var(--active);}
  .unlock .u-txt{flex:1;} .unlock .u-txt .un{font-weight:600; font-size:14.5px;} .unlock .u-txt .uo{font-size:12px; color:var(--muted);}
  .sched-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line);}
  .sched-row:last-child{border-bottom:none;}
  .sched-row .sd{width:44px; font-weight:700; font-size:14px;}
  .sched-row select{flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--line); background:var(--card); font-size:14px; color:var(--ink); font-family:inherit;}
  .pm-list h4{font-size:13px; color:var(--muted); margin:14px 0 4px; text-transform:uppercase; letter-spacing:.5px;}
  .pm-item{display:flex; align-items:center; gap:6px; padding:9px 0; border-bottom:1px solid var(--line);}
  .pm-item .avatar{width:30px; height:30px; font-size:16px; border-radius:9px;}
  .pm-item .pn{flex:1; min-width:0;}
  .pm-item .pnn{font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pm-item .pnt{font-size:11px; color:var(--muted); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pm-item button{width:32px; height:32px; border-radius:9px; border:none; background:var(--bg); font-size:14px; cursor:pointer; color:var(--ink); flex:none;}
  .pm-item button:active{background:var(--line);}
  .pm-item button.rm{color:var(--danger);}
  .addbtn{width:100%; margin-top:10px; padding:12px; border-radius:12px; border:1.5px dashed var(--faint); background:transparent; color:var(--accent-ink); font-weight:700; font-size:14px; cursor:pointer;}
  .bkp{display:flex; gap:10px;}
  .bkp button{flex:1; padding:12px; border-radius:12px; border:1.5px solid var(--accent); background:var(--accent-tint); color:var(--accent-ink); font-weight:700; font-size:13.5px; cursor:pointer;}
  .bkp button:active{background:#dcebe1;}
  .bkp-hint{font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5;}
  .resetbtn{width:100%; margin-top:8px; padding:11px; border-radius:12px; border:none; background:#F6ECE7; color:var(--danger); font-weight:700; font-size:13.5px; cursor:pointer;}

  #toast{
    position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(30px);
    background:var(--ink); color:#fff; padding:14px 18px; border-radius:14px; font-size:14px; font-weight:600;
    max-width:88%; width:max-content; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.25);
    opacity:0; pointer-events:none; transition:.3s; z-index:100;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .foot{text-align:center; font-size:12px; color:var(--faint); margin:6px 0 10px;}
</style>
</head>
<body>
  <div class="appbar"><div class="logo">✦ <span>Glow</span></div></div>
  <div id="app"></div>
  <div class="foot">Saved on this device • back up your data in Settings</div>
  <div id="toast"></div>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  <input type="file" id="photoFile" accept="image/*" style="display:none">

function load(){

}
function mergeState(s){
  const d = defaultState();
  return Object.assign(d, s, {
    products:Object.assign(d.products, s.products||{}),
    routines:Object.assign(d.routines, s.routines||{}),
    unlocked:Object.assign(d.unlocked, s.unlocked||{}),
    unlockDates:Object.assign({}, s.unlockDates||{}),
    schedule:Object.assign(d.schedule, s.schedule||{}),

  });
}

/* ============================ Date helpers ============================ */
const WD_SHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const WD_LONG=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MON=["January","February","March","April","May","June","July","August","September","October","November","December"];
function keyOf(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseKey(k){ const [y,m,dd]=k.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function sameDay(a,b){ return keyOf(a)===keyOf(b); }
function isToday(d){ return sameDay(d,new Date()); }
function daysSince(k){ return Math.round((parseKey(keyOf(new Date())) - parseKey(k))/86400000); }

/* ============================ Record access ============================ */
function recFor(k){
  if(!state.records[k]) state.records[k]={mode:"full", am:{}, pm:{}, note:""};
  const r=state.records[k];
  if(!r.am) r.am={}; if(!r.pm) r.pm={}; if(!r.mode) r.mode="full"; if(r.note===undefined) r.note=""; if(!r.spf) r.spf=[];
  return r;
}
function amListFor(k){ const r=state.records[k]; const mode=r&&r.mode==="lazy"?"lazy":"full"; return mode==="lazy"?state.routines.amLazy:state.routines.amFull; }
function amDone(k){ const r=state.records[k]; if(!r) return false; const list=amListFor(k); return list.length>0 && list.every(id=>r.am&&r.am[id]); }
function pmDone(k){ const r=state.records[k]; if(!r) return false; const list=state.routines.pm; return list.length>0 && list.every(id=>r.pm&&r.pm[id]); }
function checkedActives(k){ const r=state.records[k]; if(!r||!r.pm) return []; return state.routines.actives.filter(id=>r.pm[id]); }
function unlockedActives(){ return state.routines.actives.filter(id=>state.unlocked[id]); }
function scheduledActiveFor(d){
  if(state.stage<2) return null;
  const aid=state.schedule[d.getDay()];
  return (aid && state.unlocked[aid]) ? aid : null;
}
const SUGGESTED_ORDER=["reedle","mandelic","zeropore"];
function nextLockedActive(){ return SUGGESTED_ORDER.find(id=>state.products[id] && !state.unlocked[id]) || null; }
function firstName(id){ const p=state.products[id]; if(!p) return id; return p.short || p.name.split(/[\s(]/).slice(0,2).join(" "); }

const PROD_EMOJI={amCleanse:"💧", manyoFoam:"🫧", manyoOil:"🧴", carrotPad:"🥕", galacNiacin:"🌾", genabelle:"💫", puritoCream:"🎋", skin1004Sun:"☀️", lazySplash:"💦", reedle:"💉", mandelic:"🧪", zeropore:"🌀"};
function emojiFor(id){ const p=state.products[id]; return (p&&p.emoji) || PROD_EMOJI[id] || (p&&KIND_EMOJI[p.kind]) || "•"; }
function avatarHTML(id){ const p=state.products[id]; if(p&&p.photo) return `<div class="avatar"><img src="${p.photo}" alt=""></div>`; return `<div class="avatar">${emojiFor(id)}</div>`; }

/* ---- ingredient-conflict engine ---- */
const PROD_TAGS={
  galacNiacin:["niacinamide"],
  reedle:["exfoliant"],
  mandelic:["exfoliant","acid"],
  zeropore:["exfoliant","acid"]
};
function tagsFor(id){ const p=state.products[id]; return (p&&p.tags) || PROD_TAGS[id] || []; }
const CONFLICT_RULES=[
  {a:"exfoliant", b:"exfoliant", level:"block",
   msg:"Two exfoliating actives on the same day can over-exfoliate and damage your skin barrier — use just one per night and keep them on separate evenings.",
   why:"AHAs (glycolic, lactic, mandelic), BHAs (salicylic) and physical or microneedling exfoliants all speed up the shedding of dead surface cells. Doing two in one day removes too much at once and weakens your skin barrier — the protective outer layer — which tends to show up as redness, stinging, flaking or new breakouts. Stick to one exfoliating step per night and leave recovery days in between."},
  {a:"retinoid", b:"exfoliant", level:"warn",
   msg:"Retinoids + acids the same night can be very irritating; many people alternate them on separate nights.",
   why:"Retinoids (retinol, retinal, tretinoin) already ramp up cell turnover and often cause some dryness or peeling while your skin adjusts. Adding an exfoliating acid the same night stacks irritation on top and can overwhelm the barrier. Until your skin is well used to both, it's gentler to alternate them on separate nights."},
  {a:"retinoid", b:"vitaminc", level:"warn",
   msg:"Retinoid + vitamin C together can irritate — routines often keep vitamin C for AM and the retinoid for PM.",
   why:"Traditional (L-ascorbic acid) vitamin C works best at a low, acidic pH while retinoids prefer a higher pH, so strong versions used together can partly cancel each other out and irritate sensitive or new skin. The simple fix most routines use: vitamin C in the morning (it also boosts daytime antioxidant protection) and the retinoid at night. Modern buffered or encapsulated formulas are more flexible."},
  {a:"benzoylperoxide", b:"retinoid", level:"warn",
   msg:"Benzoyl peroxide can deactivate some retinoids when layered — use them at different times of day.",
   why:"Benzoyl peroxide is a strong oxidiser and can chemically break down some retinoids (such as retinol and tretinoin) when applied at the same time, making the retinoid less effective — and two strong actives at once is very drying. Use them at different times of day, e.g. benzoyl peroxide in the morning and the retinoid at night. One exception: adapalene (Differin) is stable with benzoyl peroxide and the two are often used together."},
  {a:"vitaminc", b:"acid", level:"warn",
   msg:"Vitamin C with an exfoliating acid at the same time can sting, and they work best at different pH — many people keep vitamin C for the morning and acids for the evening.",
   why:"Pure vitamin C and exfoliating acids are both low-pH actives, so using them together tends to sting more and can throw off the pH each one needs to perform well. Because vitamin C also pairs naturally with mornings, the easy approach is vitamin C in the AM and exfoliating acids in the PM."},
  {a:"benzoylperoxide", b:"vitaminc", level:"warn",
   msg:"Benzoyl peroxide can oxidise vitamin C and make it less effective — use them at different times of day.",
   why:"Benzoyl peroxide can oxidise vitamin C (especially the pure L-ascorbic acid form), turning it into a less active, sometimes discoloured version so you lose the brightening benefit. Keep them apart — for example benzoyl peroxide at one time of day and vitamin C at another."},
  {a:"fragrance", b:"exfoliant", level:"warn",
   msg:"Fragrance / essential oils on freshly exfoliated skin are more likely to irritate — a fragrance-free option is gentler on exfoliation nights.",
   why:"Exfoliating temporarily removes some of the outer dead-cell layer, leaving skin more permeable and reactive for a while. Fragrance and essential oils are among the most common causes of skincare irritation and allergy, so they're more likely to sting or cause redness right after exfoliating. On exfoliation nights, lean on fragrance-free products."},
  {a:"fragrance", b:"retinoid", level:"warn",
   msg:"Fragrance / essential oils can irritate skin that's using a retinoid — a fragrance-free routine is gentler.",
   why:"Retinoids can leave skin drier and more sensitive, especially in the first few weeks. Fragrance and essential oils are frequent irritants and allergens, so they're more likely to trigger redness or stinging while you're using a retinoid. A fragrance-free routine keeps things calmer."}
];
function pairConflict(id1,id2){
  const t1=tagsFor(id1), t2=tagsFor(id2);
  for(const r of CONFLICT_RULES){
    if((t1.includes(r.a)&&t2.includes(r.b)) || (t1.includes(r.b)&&t2.includes(r.a))) return r;
  }
  return null;
}
function checkedIdsForDay(k){
  const r=state.records[k]; if(!r) return [];
  const set=new Set();
  Object.keys(r.am||{}).forEach(i=>{ if(r.am[i]) set.add(i); });
  Object.keys(r.pm||{}).forEach(i=>{ if(r.pm[i]) set.add(i); });
  return [...set];
}
function candidateConflicts(k,cid){
  const res=[];
  checkedIdsForDay(k).forEach(id=>{ if(id===cid) return; const r=pairConflict(cid,id); if(r) res.push({rule:r, withId:id}); });
  return res;
}
function dayConflicts(k){
  const ids=checkedIdsForDay(k), res=[];
  for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++){ const r=pairConflict(ids[i],ids[j]); if(r) res.push({a:ids[i], b:ids[j], rule:r}); }
  return res;
}
/* plain-language ingredient types the user can pick when adding/editing a product */
const ING_TYPES=[
  {n:1, label:"Gentle / hydrating", tags:[]},
  {n:2, label:"Exfoliating acid (AHA/BHA)", tags:["exfoliant","acid"]},
  {n:3, label:"Scrub / microneedling", tags:["exfoliant"]},
  {n:4, label:"Retinol / retinoid", tags:["retinoid"]},
  {n:5, label:"Vitamin C", tags:["vitaminc"]},
  {n:6, label:"Benzoyl peroxide", tags:["benzoylperoxide"]},
  {n:7, label:"Niacinamide", tags:["niacinamide"]},
  {n:8, label:"Fragranced / essential oils", tags:["fragrance"]}
];
function matchType(tags){
  const key=[...(tags||[])].sort().join(",");
  return ING_TYPES.find(t=>[...t.tags].sort().join(",")===key) || (!tags||!tags.length?ING_TYPES[0]:null);
}
function typeLabel(id){ const t=matchType(tagsFor(id)); return t?t.label:"custom mix"; }
function promptType(currentTags){
  const cur=matchType(currentTags);
  const menu="Ingredient type (for conflict warnings) — usually shown on the bottle:\n\n"+
    ING_TYPES.map(t=>t.n+" — "+t.label).join("\n")+"\n\nEnter a number:";
  const ans=prompt(menu, cur?String(cur.n):"1");
  if(ans===null) return undefined;                 // cancelled -> keep existing
  const t=ING_TYPES.find(x=>x.n===parseInt(ans,10));
  return t?t.tags.slice():[];
}

  }else{
    const U=unlockedActives();

    }else{
      let lastId=U[0], lastDays=-1;

      // most recently unlocked = smallest daysSince
      lastId=U.reduce((a,b)=>{
        const da=state.unlockDates[a]!=null?daysSince(state.unlockDates[a]):999;
        const db=state.unlockDates[b]!=null?daysSince(state.unlockDates[b]):999;

      </div>`;
    }else{
      activesBlock=`<div class="locked-note">You're in Stage 2 but haven't unlocked any actives yet. Open <b>Settings → Actives</b> to unlock your first one (start with the Reedle Shot).</div>`;
    }
  }
  return `
  <div class="card pm">
    <div class="sec-h pm"><div class="dot"></div><h2>Evening</h2><div class="count">${base.filter(id=>r.pm[id]).length}/${base.length}</div></div>
    <div class="steps">${base.map(id=>stepHTML(id,"pm")).join("")}</div>
    ${activesBlock}
  </div>`;
}

function noteCardHTML(){
  const k=keyOf(selDate), r=recFor(k);
  return `
  <div class="card daynote">
    <label for="dayNote">How's your skin today?</label>
    <textarea id="dayNote" placeholder="Optional — e.g. a little tingly after the Reedle Shot, or looking calmer today.">${esc(r.note||"")}</textarea>
  </div>`;
}

function weekHTML(){
  let cells="";
  for(let i=6;i>=0;i--){
    const d=addDays(new Date(),-i), k=keyOf(d);
    const a=amDone(k), p=pmDone(k);
    cells+=`<div class="d ${isToday(d)?"today":""}" data-goto="${k}" style="cursor:pointer">
      <div class="dl">${WD_SHORT[d.getDay()][0]}</div><div class="dn">${d.getDate()}</div>
      <div class="dots"><i class="${a?"am":""}"></i><i class="${p?"pm":""}"></i></div></div>`;
  }
  let streak=0;
  for(let i=0;i<400;i++){ const k=keyOf(addDays(new Date(),-i)); if(amDone(k)&&pmDone(k)) streak++; else break; }
  return `
  <div class="card">
    <div class="sec-h"><h2 style="font-size:18px">This week</h2></div>
    <div class="weekgrid">${cells}</div>
    <div class="weeklegend"><span><i class="am"></i>Morning done</span><span><i class="pm"></i>Evening done</span></div>
    <div class="streak"><div class="num">${streak}</div><div class="txt"><b>${streak===1?"day":"days"} in a row</b>${streak>0?"Full AM + PM completed. Keep it going!":"Complete both today to start a streak."}</div></div>
  </div>`;
}

let monthCursor=new Date();
function calendarHTML(){
  const y=monthCursor.getFullYear(), m=monthCursor.getMonth();
  const first=new Date(y,m,1).getDay();          // 0=Sun
  const days=new Date(y,m+1,0).getDate();
  let cells="";
  for(let i=0;i<first;i++) cells+=`<div class="cell blank"></div>`;
  for(let dnum=1;dnum<=days;dnum++){
    const d=new Date(y,m,dnum), k=keyOf(d);
    const a=amDone(k), p=pmDone(k);
    const cls=(isToday(d)?"today ":"")+(sameDay(d,selDate)?"sel":"");
    cells+=`<div class="cell ${cls}" data-goto="${k}">
      <div class="cn">${dnum}</div>
      <div class="cd"><i class="${a?"am":""}"></i><i class="${p?"pm":""}"></i></div></div>`;
  }
  return `
  <div class="card cal">
    <div class="caltop">
      <button data-month="prev" aria-label="Previous month">‹</button>
      <div class="mt">${MON[m]} ${y}</div>
      <button data-month="next" aria-label="Next month">›</button>
    </div>
    <div class="wk"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
    <div class="grid">${cells}</div>
    <div class="callegend"><span><i class="am"></i>AM done</span><span><i class="pm"></i>PM done</span></div>
  </div>`;
}

function settingsHTML(){
  const acts=[["reedle","VT Reedle Shot 100","Step 1 · booster on dry skin"],["mandelic","Mandelic Acid Toner","Step 2 · gentle daily AHA"],["zeropore","Medicube Zero Pore Pad 2.0","Step 3 · AHA+BHA (swaps with mandelic)"]];
  const unlockRows=acts.map(([id,nm,ord])=>{
    const since = state.unlocked[id] && state.unlockDates[id]!=null ? ` · unlocked ${daysSince(state.unlockDates[id])}d ago` : "";
    return `<label><input type="checkbox" data-unlock="${id}" ${state.unlocked[id]?"checked":""} ${state.stage<2?"disabled":""}>
      <span class="u-txt"><span class="un">${nm}</span><span class="uo">${ord}${since}</span></span></label>`;
  }).join("");

  const ul=unlockedActives();
  const optHTML=(day)=>{
    let o=`<option value="">Rest night</option>`;
    ul.forEach(id=>{ o+=`<option value="${id}" ${state.schedule[day]===id?"selected":""}>${esc(state.products[id].name)}</option>`; });
    const cur=state.schedule[day];
    if(cur && !state.unlocked[cur]) o+=`<option value="${cur}" selected>${esc(state.products[cur].name)} (locked)</option>`;
    return o;
  };
  const schedRows=[1,2,3,4,5,6,0].map(day=>`
    <div class="sched-row"><div class="sd">${WD_SHORT[day]}</div>
      <select data-day="${day}" ${state.stage<2?"disabled":""}>${optHTML(day)}</select></div>`).join("");

  const listBlock=(title,listKey)=>{
    const items=state.routines[listKey].map(id=>{
      const p=state.products[id]; if(!p) return "";
      return `<div class="pm-item k-${p.kind}" data-id="${id}" data-list="${listKey}">
        ${avatarHTML(id)}
        <div class="pn"><div class="pnn">${esc(p.name)}</div><div class="pnt">${esc(typeLabel(id))}</div></div>
        <button data-act="photo" title="Photo">📷</button>
        <button data-act="up" title="Move up">↑</button>
        <button data-act="down" title="Move down">↓</button>
        <button data-act="edit" title="Edit">✎</button>
        <button data-act="rm" class="rm" title="Remove">✕</button></div>`;
    }).join("");
    return `<div class="pm-list"><h4>${title}</h4>${items}
      <button class="addbtn" data-add="${listKey}">＋ Add product to ${title}</button></div>`;
  };

  return `
  <div class="card">
    <details class="settings">
      <summary>⚙️ Settings</summary>

      <div class="set-block">
        <h3>Current stage</h3>
        <div class="seg">
          <button data-stage="1" class="${state.stage===1?"sel":""}">Stage 1 · Base</button>
          <button data-stage="2" class="${state.stage===2?"sel":""}">Stage 2 · Actives</button>
        </div>
        <div class="modehint" style="text-align:left;margin-top:8px">${state.stage===1?"Do the gentle base twice daily for ~2 weeks before moving on.":"Introduce actives one at a time, ~2 weeks apart, PM only."}</div>
      </div>

      <div class="set-block">
        <h3>Actives — unlock one at a time</h3>
        <div class="unlock">${unlockRows}</div>
        ${state.stage<2?`<div class="modehint" style="text-align:left;margin-top:8px">Switch to Stage 2 above to start unlocking actives.</div>`:""}
      </div>

      <div class="set-block">
        <h3>Weekly evening schedule</h3>
        <div>${schedRows}</div>
      </div>

      <div class="set-block">
        <h3>Your products</h3>
        ${listBlock("Morning · Full","amFull")}
        ${listBlock("Morning · Lazy","amLazy")}
        ${listBlock("Evening base","pm")}
        ${listBlock("Actives","actives")}
      </div>

      <div class="set-block">
        <h3>Backup &amp; restore</h3>
        <div class="bkp">
          <button data-export="1">⬇︎ Export backup</button>
          <button data-import="1">⬆︎ Import backup</button>
        </div>
        <div class="bkp-hint">Your data lives only in this browser. Export a backup file every so often (e.g. to Files or email) so you can restore it if Safari clears its data or you switch phones.</div>
      </div>

      <div class="set-block">
        <h3>Danger zone</h3>
        <button class="resetbtn" data-reset="1">Reset everything to defaults</button>
      </div>
    </details>
  </div>`;
}

function render(){
  app.innerHTML = todayHTML()+guideHTML()+conflictBannerHTML()+amHTML()+pmHTML()+noteCardHTML()+weekHTML()+calendarHTML()+settingsHTML();
}

/* ============================ Interactions ============================ */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2800);
}

function toggleStep(id, period, stepEl){
  const k=keyOf(selDate), r=recFor(k);
  const bucket = period==="am" ? r.am : r.pm;
  const willCheck = !bucket[id];
  const isActive = state.products[id] && state.products[id].kind==="active";
  // sunscreen: log/clear the first application time, then full re-render for the tracker
  if(id==="skin1004Sun" && period==="am"){
    if(willCheck){ bucket[id]=true; if(isToday(selDate) && (!r.spf||!r.spf.length)) r.spf=[Date.now()]; }
    else { delete bucket[id]; r.spf=[]; }
    save(); render(); return;
  }
  if(willCheck){
    const cf=candidateConflicts(k,id);
    if(cf.length){
      const c=cf[0];
      if(cf.some(x=>x.rule.level==="block")){
        if(!confirm("⚠️ Ingredient clash with "+firstName(c.withId)+"\n\n"+c.rule.msg+"\n\nUse it anyway?")) return;
      }else{
        toast("⚠️ Heads up — clashes with "+firstName(c.withId));
      }
    }
  }
  if(willCheck) bucket[id]=true; else delete bucket[id];
  save();
  if(tagsFor(id).length){ render(); return; }   // refresh conflict banner for tagged products
  if(stepEl){
    const onClass = period==="am" ? "on-am" : (isActive?"on-active":"on-pm");
    stepEl.classList.toggle("checked", willCheck);
    stepEl.classList.remove("on-am","on-pm","on-active");
    if(willCheck) stepEl.classList.add(onClass);
  }
  updateStatusUI();
}

function updateStatusUI(){
  const k=keyOf(selDate), r=recFor(k);
  const pAm=document.querySelector(".progress .p.am"), pPm=document.querySelector(".progress .p.pm");
  if(pAm){ pAm.classList.toggle("done",amDone(k)); pAm.querySelector(".v").textContent=amDone(k)?"Done":"To do"; }
  if(pPm){ pPm.classList.toggle("done",pmDone(k)); pPm.querySelector(".v").textContent=pmDone(k)?"Done":"To do"; }
  const amList=amListFor(k);
  const amC=document.querySelector(".card.am .count"); if(amC) amC.textContent=amList.filter(id=>r.am[id]).length+"/"+amList.length;
  const pmC=document.querySelector(".card.pm .count"); if(pmC) pmC.textContent=state.routines.pm.filter(id=>r.pm[id]).length+"/"+state.routines.pm.length;
  const wk=document.querySelector(".weekgrid");
  if(wk){ const wrap=document.createElement("div"); wrap.innerHTML=weekHTML(); wk.closest(".card").replaceWith(wrap.firstElementChild); }
}

/* click delegation */
document.addEventListener("click",(e)=>{
  const t=e.target;

  const tog=t.closest("[data-toggle]");
  if(tog){ const det=tog.parentElement.querySelector("details.note"); if(det) det.open=!det.open; return; }

  const nav=t.closest("[data-nav]");
  if(nav){ e.preventDefault();
    const dir=nav.getAttribute("data-nav");
    if(dir==="prev") selDate=addDays(selDate,-1);
    else if(dir==="next") selDate=addDays(selDate,1);
    else selDate=new Date();
    render(); return;
  }

  const mo=t.closest("[data-month]");
  if(mo){ monthCursor=new Date(monthCursor.getFullYear(), monthCursor.getMonth()+(mo.getAttribute("data-month")==="next"?1:-1), 1); render(); return; }

  const goto=t.closest("[data-goto]");
  if(goto){ selDate=parseKey(goto.getAttribute("data-goto")); monthCursor=new Date(selDate.getFullYear(),selDate.getMonth(),1); render(); window.scrollTo({top:0,behavior:"smooth"}); return; }

  const spf=t.closest("[data-spf]");
  if(spf){ const r=recFor(keyOf(new Date())); r.spf=r.spf||[]; r.spf.push(Date.now()); save(); render(); toast("✓ Reapply logged"); return; }

  const mb=t.closest("[data-mode]");
  if(mb){ recFor(keyOf(selDate)).mode=mb.getAttribute("data-mode"); save(); render(); return; }

  const sb=t.closest("[data-stage]");
  if(sb){ state.stage=parseInt(sb.getAttribute("data-stage"),10); save(); reRenderKeepSettings(); return; }

  if(t.closest("[data-export]")){ exportBackup(); return; }
  if(t.closest("[data-import]")){ document.getElementById("importFile").click(); return; }

  if(t.closest("[data-reset]")){
    if(confirm("Reset ALL products, schedule and check-off history to defaults? This can't be undone.")){
      state=defaultState(); state.startDate=keyOf(new Date()); selDate=new Date(); save(); render();
    }
    return;
  }

  const pmItem=t.closest(".pm-item");
  if(pmItem && t.closest("[data-act]")){ doProductAction(t.closest("[data-act]").getAttribute("data-act"), pmItem.getAttribute("data-list"), pmItem.getAttribute("data-id")); return; }
  const addBtn=t.closest("[data-add]");
  if(addBtn){ addProduct(addBtn.getAttribute("data-add")); return; }

  const step=t.closest(".step");
  if(step && !t.closest("details.note") && !t.closest("[data-toggle]")){
    toggleStep(step.getAttribute("data-step"), step.getAttribute("data-period"), step); return;
  }
});

/* change delegation */
document.addEventListener("change",(e)=>{
  const t=e.target;
  if(t.id==="importFile"){ importBackup(t.files&&t.files[0]); t.value=""; return; }
  if(t.id==="photoFile"){ if(pendingPhotoId && t.files&&t.files[0]) setPhoto(pendingPhotoId, t.files[0]); pendingPhotoId=null; t.value=""; return; }
  const unl=t.getAttribute && t.getAttribute("data-unlock");
  if(unl){
    state.unlocked[unl]=t.checked;
    if(t.checked){ if(state.unlockDates[unl]==null) state.unlockDates[unl]=keyOf(new Date()); }
    else { delete state.unlockDates[unl]; }
    save(); reRenderKeepSettings(); return;
  }
  const day=t.getAttribute && t.getAttribute("data-day");
  if(day!=null && t.tagName==="SELECT"){
    state.schedule[parseInt(day,10)] = t.value || null; save();
    const wrap=document.createElement("div"); wrap.innerHTML=todayHTML();
    document.querySelector(".card.today").replaceWith(wrap.firstElementChild); return;
  }
});

/* day note (no re-render, keeps focus) */
document.addEventListener("input",(e)=>{
  if(e.target.id==="dayNote"){ recFor(keyOf(selDate)).note=e.target.value; save(); }
});

function reRenderKeepSettings(){ render(); const s=document.querySelector("details.settings"); if(s) s.open=true; }

/* ---- product management ---- */
let pendingPhotoId=null;
function setPhoto(id,file){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const S=110, c=document.createElement("canvas"); c.width=S; c.height=S;
        const ctx=c.getContext("2d");
        const scale=Math.max(S/img.width, S/img.height);
        const w=img.width*scale, h=img.height*scale;
        ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h);
        state.products[id].photo=c.toDataURL("image/jpeg",0.82);
        save(); reRenderKeepSettings(); toast("✓ Photo added");
      }catch(e){ toast("Couldn't process that image"); }
    };
    img.onerror=()=>toast("Couldn't read that image");
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}
function doProductAction(act,list,id){
  const arr=state.routines[list], i=arr.indexOf(id);
  if(act==="up" && i>0){ [arr[i-1],arr[i]]=[arr[i],arr[i-1]]; }
  else if(act==="down" && i<arr.length-1){ [arr[i+1],arr[i]]=[arr[i],arr[i+1]]; }
  else if(act==="rm"){ if(confirm('Remove "'+state.products[id].name+'" from this list?')) arr.splice(i,1); else return; }
  else if(act==="photo"){
    const p=state.products[id];
    if(p.photo){ if(confirm("Remove this photo?  (Press Cancel to choose a different one instead.)")){ delete p.photo; save(); reRenderKeepSettings(); return; } }
    pendingPhotoId=id; document.getElementById("photoFile").click(); return;
  }
  else if(act==="edit"){
    const p=state.products[id];
    const nm=prompt("Product name:",p.name); if(nm===null) return;
    const wf=prompt("What it's for:",p.whatFor); if(wf===null) return;
    const ht=prompt("How to use:",p.howTo); if(ht===null) return;
    p.name=nm.trim()||p.name; p.whatFor=wf.trim(); p.howTo=ht.trim();
    const tg=promptType(tagsFor(id)); if(tg!==undefined) p.tags=tg;
  }
  save(); reRenderKeepSettings();
}
function addProduct(list){
  const nm=prompt("New product name:"); if(!nm||!nm.trim()) return;
  const wf=prompt("What it's for (optional):")||"";
  const ht=prompt("How to use (optional):")||"";
  const id="p"+Date.now().toString(36);
  const kind = list==="actives" ? "active" : "moisturise";
  const tg=promptType(list==="actives"?["exfoliant","acid"]:[]);
  state.products[id]={name:nm.trim(),kind,whatFor:wf.trim(),howTo:ht.trim(),tags:(tg===undefined?[]:tg)};
  if(list==="actives"){ state.products[id].activeId=id; state.unlocked[id]=false; }
  state.routines[list].push(id);
  save(); reRenderKeepSettings();
}

/* ---- backup / restore ---- */
function exportBackup(){
  try{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="glow-skincare-backup-"+keyOf(new Date())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("✓ Backup file created");
  }catch(e){ toast("Couldn't export on this browser"); }
}
function importBackup(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data || !data.products || !data.routines) throw new Error("bad file");
      if(confirm("Replace your current data with this backup?")){
        state=mergeState(data); if(!state.startDate) state.startDate=keyOf(new Date());
        selDate=new Date(); save(); render(); toast("✓ Backup restored");
      }
    }catch(e){ toast("That doesn't look like a Glow backup file"); }
  };
  reader.readAsText(file);
}

/* ============================ Go ============================ */
if(!state.startDate){ state.startDate=keyOf(new Date()); save(); }
render();
</script>
</body>
</html>
